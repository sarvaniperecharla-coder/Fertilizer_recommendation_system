<!DOCTYPE html>
<html>
<head>
    <title>Fertilizer Recommendation System</title>
</head>

<body>

    <h1>AI-Based Fertilizer Recommendation System</h1>

    <a href="/">Home</a> | <a href="/history">History</a>

    <form action="/predict" method="POST">

        <label>Soil Type:</label>
        <select name="soil" required>
            {% for s in soil_types %}
                <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
        </select>

        <br><br>

        <label>Crop Type:</label>
        <select name="crop" required>
            {% for c in crop_types %}
                <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>

        <br><br>

        <label>Nitrogen (N):</label>
        <input type="number" name="nitrogen" step="any" required>

        <br><br>

        <label>Phosphorus (P):</label>
        <input type="number" name="phosphorus" step="any" required>

        <br><br>

        <label>Potassium (K):</label>
        <input type="number" name="potassium" step="any" required>

        <br><br>

        <label>Temperature:</label>
        <input type="number" name="temperature" step="any" required>

        <br><br>

        <label>Humidity:</label>
        <input type="number" name="humidity" step="any" required>

        <br><br>

        <label>Moisture:</label>
        <input type="number" name="moisture" step="any" required>

        <br><br>

        <button type="submit">Predict Fertilizer</button>

    </form>

    <hr>

    <div style="margin-top:20px;padding:10px;border:1px solid green;">
    <h2>{{ prediction_text }}</h2>
</div>



</body>
</html>
